name = "discord-event-bot"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# --- D1 データベース ---
# 「Deploy to Cloudflare」ボタンを使う場合は自動で作成・接続されます。
# CLI でデプロイする場合は `wrangler d1 create discord-event-bot-db` を実行し、
# 出力された database_id を下の値に貼り付けてください。
[[d1_databases]]
binding = "DB"
database_name = "discord-event-bot-db"
database_id = "00000000-0000-0000-0000-000000000000"  # ← 自分の D1 の database_id に置き換える
migrations_dir = "migrations"

# --- 日次 cron（UTC基準。0 12 * * * = JST 21:00）---
[triggers]
crons = ["0 12 * * *"]

# --- 管理UI（静的アセット）---
# ui/ ディレクトリを SPA として配信。env.ASSETS でプログラムからも参照可能。
[assets]
directory = "./ui"
binding = "ASSETS"
not_found_handling = "single-page-application"

# シークレットは「Deploy to Cloudflare」では管理画面で、CLI では wrangler secret put で設定（コミットしない）:
#   DISCORD_PUBLIC_KEY / DISCORD_APPLICATION_ID / DISCORD_BOT_TOKEN / ADMIN_TOKEN
# ※ 投稿チャンネルは Notification ごとに DB で持つため、単一の DISCORD_CHANNEL_ID は廃止。
